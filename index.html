<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0e0e0e"/>
<title>P 84x88 — Compras</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0e0e0e;--sur:#161616;--card:#1c1c1c;--bord:#2a2a2a;--bord2:#333;
--gold:#c9a84c;--gold2:#e4c97a;--golddim:rgba(201,168,76,.13);
--w:#f0f0f0;--wdim:#888;--wfaint:#2e2e2e;
--red:#d9534f;--redbg:rgba(217,83,79,.12);--ok:#4caf50;--okbg:rgba(76,175,80,.1);
--f:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
--r:12px;--rsm:8px;--rlg:18px;--navh:62px;--hdrh:56px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{height:100%}
body{font-family:var(--f);background:var(--bg);color:var(--w);min-height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
input,button,select,textarea{font-family:inherit}button{cursor:pointer;border:none;background:none}
.scr{flex:1;min-height:0;overflow-y:auto;padding:14px;padding-bottom:calc(92px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
.scr::-webkit-scrollbar{width:3px}.scr::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:2px}
/* LOGIN */
#login{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:24px}
.lg-logo{width:120px;height:120px;background:#1a1a1a;border:1px solid var(--bord2);border-radius:22px;overflow:hidden;margin-bottom:18px;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.lg-logo img{width:100%;height:100%;object-fit:cover}
.lg-name{font-size:12px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.lg-sub{font-size:12px;color:var(--wdim);margin-bottom:24px}
.lg-sep{width:36px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 24px}
.dots{display:flex;gap:10px;margin-bottom:8px;justify-content:center}
.dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--bord2);transition:all .15s}
.dot.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(201,168,76,.5);transform:scale(1.2)}
.pin-err{color:var(--red);font-size:12px;height:18px;text-align:center;margin-bottom:8px}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;width:100%;max-width:280px}
.nb{background:var(--card);border:1px solid var(--bord);border-radius:var(--r);color:var(--w);font-family:var(--fm);font-size:22px;font-weight:500;height:64px;transition:all .1s;user-select:none}
.nb:active{transform:scale(.92);background:var(--bord2)}
.nb.del{font-size:14px;color:var(--wdim)}
.nb.go{background:var(--gold);color:var(--bg);border-color:transparent;font-size:12px;font-weight:700;letter-spacing:.06em;font-family:var(--f)}.nb.go:active{background:var(--gold2)}
/* APP */
#app{display:flex;flex-direction:column;height:100dvh;min-height:100dvh}#app.hidden{display:none}
header{height:var(--hdrh);background:var(--sur);border-bottom:1px solid var(--bord);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.hlogo{width:34px;height:34px;border-radius:8px;overflow:hidden;border:1px solid var(--bord2);flex-shrink:0}.hlogo img{width:100%;height:100%;object-fit:cover}
.htitle{font-size:15px;font-weight:600;flex:1}
.hdate{font-family:var(--fm);font-size:10px;color:var(--wdim);background:var(--card);padding:3px 8px;border-radius:6px;border:1px solid var(--bord)}
.hav{width:30px;height:30px;border-radius:50%;background:var(--golddim);border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gold);cursor:pointer}
/* NAV */
#nav{height:calc(var(--navh) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--sur);border-top:1px solid var(--bord);display:flex;align-items:stretch;flex-shrink:0}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--wdim);font-size:10px;cursor:pointer;transition:color .15s;user-select:none;position:relative}
.ni .ic{font-size:20px;transition:transform .15s}.ni.active{color:var(--gold)}.ni.active .ic{transform:scale(1.1)}
.ni.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--gold);border-radius:2px 2px 0 0}
/* CARDS */
.card{background:var(--card);border:1px solid var(--bord);border-radius:var(--rlg);padding:14px;margin-bottom:11px}
.ctitle{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--wdim);margin-bottom:10px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.bg{background:var(--golddim);color:var(--gold)}.bgray{background:var(--wfaint);color:var(--wdim)}.bred{background:var(--redbg);color:var(--red)}.bgreen{background:var(--okbg);color:var(--ok)}
/* REPORT BAR */
.report-bar{background:var(--sur);border:1px solid var(--bord);border-radius:var(--rlg);padding:14px;margin-bottom:11px}
.rb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--wdim);margin-bottom:10px}.rb-row{display:flex;gap:8px}
.rb-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:12px 4px;border-radius:var(--r);font-size:10px;font-weight:600;cursor:pointer;border:none;transition:all .12s;user-select:none}
.rb-btn:active{transform:scale(.95)}.rb-xl{background:rgba(76,175,80,.1);color:#81c784;border:1px solid rgba(76,175,80,.25)}
.rb-pdf{background:var(--golddim);color:var(--gold);border:1px solid rgba(201,168,76,.3)}.rb-tix{background:rgba(100,181,246,.1);color:#90caf9;border:1px solid rgba(100,181,246,.25)}.rb-icon{font-size:20px}
/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.stat{background:var(--card);border:1px solid var(--bord);border-radius:var(--r);padding:13px}
.slbl{font-size:10px;color:var(--wdim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}.sval{font-size:22px;font-weight:700;font-family:var(--fm)}.sval.g{color:var(--gold)}.ssub{font-size:10px;color:var(--wdim);margin-top:2px}
/* BTN */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:600;transition:all .1s;cursor:pointer;border:none;user-select:none}
.btn:active{transform:scale(.97)}.btn-g{background:var(--gold);color:var(--bg)}.btn-g:active{background:var(--gold2)}
.btn-o{background:transparent;border:1px solid var(--bord2);color:var(--w)}.btn-d{background:var(--redbg);color:var(--red);border:1px solid rgba(217,83,79,.25)}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:var(--rsm)}.btn-full{width:100%}
/* FORM */
.fg{margin-bottom:11px}.fl{font-size:10px;font-weight:600;color:var(--wdim);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em}
.fi{width:100%;background:var(--sur);border:1px solid var(--bord);border-radius:var(--rsm);color:var(--w);padding:10px 12px;font-size:14px;transition:border-color .15s;-webkit-appearance:none}
.fi:focus{outline:none;border-color:var(--gold)}.fi::placeholder{color:var(--wdim)}.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}.fr3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:7px}
/* CHIPS */
.chip{display:inline-flex;align-items:center;padding:8px 14px;background:var(--card);border:1px solid var(--bord);border-radius:40px;font-size:13px;font-weight:500;cursor:pointer;margin:0 6px 8px 0;transition:all .12s;user-select:none;white-space:nowrap}
.chip:active{transform:scale(.96)}.chip.sel{background:var(--golddim);border-color:var(--gold);color:var(--gold)}.chip.new{border-style:dashed}
/* ENTRY */
.entry{background:var(--card);border:1px solid var(--bord);border-radius:var(--rlg);padding:13px;margin-bottom:10px}
.entry-head{display:flex;align-items:center;gap:8px;margin-bottom:11px}.entry-prov{font-size:13px;font-weight:700;flex:1}
/* TICKET ZONE — FIX 2: foto + archivo + múltiples */
.tkt-zone{border:1.5px dashed var(--bord2);border-radius:var(--rsm);padding:12px;margin-bottom:12px;transition:all .2s}
.tkt-zone.has{border-color:var(--gold);background:var(--golddim)}
.tkt-btns{display:flex;gap:8px;margin-bottom:10px}
.tkt-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 8px;border-radius:var(--rsm);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bord2);background:var(--sur);color:var(--w);transition:all .1s;user-select:none}
.tkt-btn:active{transform:scale(.96);border-color:var(--gold);color:var(--gold)}
.tkt-list{display:flex;flex-direction:column;gap:6px}
.tkt-item{display:flex;align-items:center;gap:8px;background:var(--sur);border-radius:var(--rsm);padding:8px 10px;border:1px solid var(--bord)}
.tkt-name{font-size:11px;color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tkt-del{color:var(--wdim);font-size:13px;padding:2px 5px}
.tkt-del:active{color:var(--red)}.tkt-open{font-size:11px;color:#90caf9;text-decoration:none;border:1px solid rgba(144,202,249,.25);padding:4px 8px;border-radius:999px}.tkt-open:active{transform:scale(.98)}.tkt-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:700}.tkt-badge.ok{background:rgba(76,175,80,.12);color:#81c784}.tkt-badge.wait{background:rgba(201,168,76,.12);color:var(--gold)}.help-note{font-size:11px;color:var(--wdim);line-height:1.45}
/* ITEMS */
.irow{display:flex;align-items:center;gap:8px;background:var(--sur);border-radius:var(--rsm);padding:9px 10px;margin-bottom:5px;border:1px solid var(--bord)}
.iinfo{flex:1;min-width:0}.iname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.imeta{font-size:10px;color:var(--wdim);font-family:var(--fm)}.itot{font-family:var(--fm);font-size:12px;font-weight:600;color:var(--gold);white-space:nowrap}
.idel{color:var(--wfaint);font-size:14px;padding:4px;border-radius:5px}.idel:active{color:var(--red)}
.iedit{color:var(--wdim);font-size:13px;padding:4px;border-radius:5px}.iedit:active{color:var(--gold)}
.add-form{background:var(--sur);border:1px solid var(--bord);border-radius:var(--rsm);padding:12px;display:none;margin-top:8px}.add-form.open{display:block}
/* SEARCH */
.swrap{position:relative;margin-bottom:14px}.swrap .sic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--wdim);font-size:15px;pointer-events:none}
.rcard{background:var(--card);border:1px solid var(--bord);border-radius:var(--r);padding:13px;margin-bottom:8px}
/* HISTORY */
.ditem{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--bord);border-radius:var(--r);padding:12px 13px;margin-bottom:8px;cursor:pointer;transition:all .12s}
.ditem:active{transform:scale(.98);border-color:var(--gold)}.dbadge{background:var(--golddim);border:1px solid var(--gold);border-radius:var(--rsm);padding:7px 10px;text-align:center;min-width:44px}
.dbd{font-size:18px;font-weight:700;color:var(--gold);line-height:1;font-family:var(--fm)}.dbm{font-size:9px;text-transform:uppercase;color:var(--gold);letter-spacing:.06em}
.dtxt{flex:1}.dtitle{font-size:13px;font-weight:600}.dsub{font-size:11px;color:var(--wdim);margin-top:2px}
/* USERS */
.ucard{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--bord);border-radius:var(--r);padding:12px 13px;margin-bottom:8px}
.uav{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
.uav.admin{background:var(--golddim);color:var(--gold);border:1.5px solid var(--gold)}.uav.viewer{background:var(--wfaint);color:var(--wdim)}
/* MODAL */
#moverlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center}
#moverlay.hidden{display:none}
#mbox{background:var(--card);border-radius:20px 20px 0 0;border:1px solid var(--bord);border-bottom:none;width:100%;max-width:500px;padding:20px;max-height:90vh;overflow-y:auto;animation:su .22s cubic-bezier(.4,0,.2,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:32px;height:3px;background:var(--bord2);border-radius:2px;margin:0 auto 16px}.mtitle{font-size:16px;font-weight:700;margin-bottom:14px}
/* TOAST */
#toast{position:fixed;bottom:calc(var(--navh) + 12px);left:50%;transform:translateX(-50%) translateY(12px);background:var(--card);border:1px solid var(--bord2);color:var(--w);padding:8px 18px;border-radius:40px;font-size:12px;font-weight:500;z-index:900;opacity:0;transition:all .2s;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--gold);color:var(--gold)}#toast.err{border-color:var(--red);color:var(--red)}
/* LOADING */
#loading{position:fixed;inset:0;z-index:800;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(3px)}#loading.hidden{display:none}
.sp{width:34px;height:34px;border:2.5px solid var(--bord2);border-top-color:var(--gold);border-radius:50%;animation:spin .65s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:var(--bord);margin:10px 0}.fb{display:flex;align-items:center;justify-content:space-between}
.empty{text-align:center;padding:40px 16px;color:var(--wdim)}.empty-ic{font-size:36px;margin-bottom:8px;opacity:.3}.empty-tx{font-size:13px}
.mono{font-family:var(--fm)}.gold{color:var(--gold)}.muted{color:var(--wdim)}.mt8{margin-top:8px}.mt12{margin-top:12px}
.bal-card{background:var(--card);border:1px solid var(--bord);border-radius:var(--r);padding:14px;margin-bottom:10px}
.balance-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--bord);gap:8px}
.balance-prov{font-size:13px;font-weight:500;flex:1}.balance-total{font-family:var(--fm);font-size:13px;font-weight:600;color:var(--gold)}
@media(min-width:520px){#mbox{border-radius:var(--rlg);align-self:center;margin:auto}#moverlay{align-items:center}}
</style>
</head>

<script>

const API='https://script.google.com/macros/s/AKfycbwR4HAW0_ELp4I_I3ekkRPSair0xTLp_eL9t_ZWvHXe7nvGOzLbj44c6fBknBptqh1czw/exec';
const S={user:null,pin:'',fecha:today(),provs:[],compras:{},tickets:{},screen:'home'};

async function api(a,p){
  p=p||{};
  try{
    var r=await fetch(API,{method:'POST',body:JSON.stringify(Object.assign({action:a,pin:S.pin},p)),headers:{'Content-Type':'text/plain'},redirect:'follow'});
    return JSON.parse(await r.text());
  }catch(e){return{ok:false,error:'Sin conexion: '+e.message};}
}
function today(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return String(n).padStart(2,'0');}
function fmtL(s){var p=s.split('-'),M=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];return parseInt(p[2])+' de '+M[parseInt(p[1])-1]+' de '+p[0];}
function fmtS(s){var p=s.split('-'),M=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return parseInt(p[2])+' '+M[parseInt(p[1])-1]+' '+p[0];}
function money(v){return '$'+Math.abs(parseFloat(v)||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});}
function toast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='show'+(t?' '+t:'');clearTimeout(window._tt);window._tt=setTimeout(function(){e.className='';},3500);}
function load(v){document.getElementById('loading').classList.toggle('hidden',!v);}
function el(id){return document.getElementById(id);}
function oModal(h,t){el('mc').innerHTML=(t?'<div class="mtitle">'+t+'</div>':'')+h;el('moverlay').classList.remove('hidden');}
function cModal(e){if(!e||e.target===el('moverlay'))el('moverlay').classList.add('hidden');}

/* ── LOGIN ── */
var pin='';
function updDots(){for(var i=0;i<4;i++){var d=el('d'+i);if(d)d.classList.toggle('on',i<pin.length);}}
document.querySelectorAll('.nb[data-n]').forEach(function(b){
  b.addEventListener('click',function(){
    if(pin.length>=6)return;
    pin+=b.dataset.n;updDots();el('perr').textContent='';
    if(pin.length===4)setTimeout(doLogin,200);
  });
});
el('pdel').addEventListener('click',function(){pin=pin.slice(0,-1);updDots();});
el('pgo').addEventListener('click',doLogin);
async function doLogin(){
  if(!pin)return;load(true);
  var r;
  try{r=await api('login',{pin:pin});}catch(e){load(false);el('perr').textContent='Error: '+e.message;return;}
  load(false);
  if(!r){el('perr').textContent='Sin respuesta del servidor';return;}
  if(r.ok){
    S.pin=pin;S.user=r.user;
    el('login').style.display='none';el('app').classList.remove('hidden');
    el('hav').textContent=r.user.nombre.charAt(0).toUpperCase();
    if(r.user.rol==='admin')el('nav-admin').style.display='flex';
    await loadProvs();go('home');
  }else{el('perr').textContent=r.error||'PIN incorrecto';pin='';updDots();}
}
function uMenu(){
  var h='<div style="text-align:center;padding:6px 0 14px">'+
    '<div class="uav '+S.user.rol+'" style="margin:0 auto 10px;width:52px;height:52px;font-size:20px">'+S.user.nombre.charAt(0).toUpperCase()+'</div>'+
    '<div style="font-size:16px;font-weight:700">'+S.user.nombre+'</div>'+
    '<div class="badge bg mt8">'+S.user.rol+'</div></div>'+
    '<div class="divider"></div>'+
    '<button class="btn btn-d btn-full mt12" id="btn-logout">Cerrar sesion</button>';
  oModal(h);
  setTimeout(function(){var b=el('btn-logout');if(b)b.addEventListener('click',function(){S.user=null;S.pin='';pin='';updDots();el('app').classList.add('hidden');el('login').style.display='flex';cModal();});},50);
}

/* ── NAV ── */
var TITLES={home:'Inicio',nueva:'Nueva Compra',buscar:'Buscar',historial:'Historial',balance:'Balance',usuarios:'Usuarios'};
function go(s){
  S.screen=s;
  document.querySelectorAll('.ni').forEach(function(n){n.classList.toggle('active',n.dataset.s===s);});
  el('htitle').textContent=TITLES[s]||s;
  ({home:pgHome,nueva:pgNueva,buscar:pgBuscar,historial:pgHistorial,balance:pgBalance,usuarios:pgUsuarios})[s]?.();
}
document.querySelectorAll('.ni').forEach(function(n){n.addEventListener('click',function(){go(n.dataset.s);});});
async function loadProvs(){var r=await api('getProveedores');if(r.ok)S.provs=r.proveedores;}

/* ── HOME ── */
async function pgHome(){
  el('hdate').textContent=fmtS(S.fecha);
  el('content').innerHTML='<div class="empty"><div class="sp" style="margin:0 auto"></div></div>';
  load(true);
  var res=await Promise.all([api('getComprasByDate',{fecha:S.fecha}),api('getTicketsByDate',{fecha:S.fecha})]);
  load(false);
  var cr=res[0],tr=res[1];
  S.compras={};S.tickets={};
  if(cr.ok)(cr.compras||[]).forEach(function(c){if(!S.compras[c.proveedor])S.compras[c.proveedor]=[];S.compras[c.proveedor].push(c);});
  if(tr.ok)(tr.tickets||[]).forEach(function(t){if(!S.tickets[t.proveedor])S.tickets[t.proveedor]=[];S.tickets[t.proveedor].push(t);});
  var items=[];Object.values(S.compras).forEach(function(a){items=items.concat(a);});
  var total=items.reduce(function(s,c){return s+(parseFloat(c.total)||0);},0);
  var provList=Object.keys(S.compras);
  var tickCount=Object.values(S.tickets).reduce(function(s,a){return s+a.length;},0);

  var detalle='';
  provList.forEach(function(p){
    var sub=(S.compras[p]||[]).reduce(function(s,i){return s+(parseFloat(i.total)||0);},0);
    detalle+='<div style="margin-bottom:12px">';
    detalle+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">';
    detalle+='<span style="font-size:11px;color:var(--gold)">&#9670;</span>';
    detalle+='<span style="font-size:13px;font-weight:700;flex:1">'+p+'</span>';
    if(S.tickets[p]&&S.tickets[p].length)detalle+='<span class="badge bgreen" style="font-size:9px">&#128206; '+S.tickets[p].length+' ticket(s)</span>';
    detalle+='<span class="mono" style="font-size:13px;color:var(--gold);font-weight:700">'+money(sub)+'</span></div>';
    (S.compras[p]||[]).forEach(function(it){
      detalle+='<div class="fb" style="padding:4px 8px;font-size:12px;border-bottom:1px solid var(--bord)">';
      detalle+='<span>'+it.producto+' <span class="muted">'+it.cantidad+' '+it.unidad+'</span></span>';
      detalle+='<span class="mono">'+money(it.total)+'</span></div>';
    });
    detalle+='</div>';
  });

  el('content').innerHTML=
    '<div class="fb" style="margin-bottom:14px">'+
    '<div><div style="font-size:11px;color:var(--wdim);margin-bottom:3px">'+fmtL(S.fecha)+'</div>'+
    '<div class="mono gold" style="font-size:24px;font-weight:700">'+money(total)+'</div></div>'+
    '<button class="btn btn-o btn-sm" id="btn-fecha">&#128197; Cambiar fecha</button></div>'+
    '<div class="report-bar">'+
    '<div class="rb-title">&#128228; Generar reportes del dia</div>'+
    '<div class="rb-row">'+
    '<button class="rb-btn rb-xl" id="btn-xlsx"><span class="rb-icon">&#128202;</span><span>Excel Compras</span></button>'+
    '<button class="rb-btn rb-pdf" id="btn-pdf"><span class="rb-icon">&#128196;</span><span>PDF Compras</span></button>'+
    '<button class="rb-btn rb-tix" id="btn-tix"><span class="rb-icon">&#128279;</span><span>Excel Tickets</span></button>'+
    '</div><div id="report-links"></div></div>'+
    '<div class="stats">'+
    '<div class="stat"><div class="slbl">Total del dia</div><div class="sval g" style="font-size:18px">'+money(total)+'</div></div>'+
    '<div class="stat"><div class="slbl">Articulos</div><div class="sval">'+items.length+'</div><div class="ssub">'+tickCount+' ticket(s)</div></div>'+
    '</div>'+
    (provList.length
      ?'<div class="card"><div class="ctitle">&#128196; Detalle del dia</div>'+detalle+'</div>'
      :'<div class="empty"><div class="empty-ic">&#10022;</div><div class="empty-tx">Sin compras para esta fecha</div></div>'
    )+
    '<div style="display:flex;gap:8px;margin-top:4px">'+
    '<button class="btn btn-o" style="flex:1" id="btn-ver-dia">Ver / editar dia</button>'+
    '<button class="btn btn-g" style="flex:1" id="btn-reg">+ Registrar compras del dia</button>'+
    '</div>';

  el('btn-fecha').addEventListener('click',pickFecha);
  el('btn-reg').addEventListener('click',function(){go('nueva');});
  var bvd=el('btn-ver-dia');if(bvd)bvd.addEventListener('click',function(){showDay(S.fecha);});
  el('btn-xlsx').addEventListener('click',function(){genReport('xlsx');});
  el('btn-pdf').addEventListener('click',function(){genReport('pdf');});
  el('btn-tix').addEventListener('click',function(){genReport('tickets');});
}

/* FIX 1: genReport — manejo correcto de errores de configuración */
async function genReport(tipo){
  load(true);toast('Generando '+tipo.toUpperCase()+'...');
  var r=await api('generateReport',{fecha:S.fecha,tipo:tipo});
  load(false);
  if(!r.ok){
    var msg=r.error||'Error generando reporte';
    // Detectar error de ROOT_FOLDER_ID no configurado
    if(msg.indexOf('getFolderById')>-1||msg.indexOf('DriveApp')>-1){
      msg='Error: ROOT_FOLDER_ID no configurado en Code.gs. Ve a Apps Script y pega el ID de tu carpeta de Drive en la linea ROOT_FOLDER_ID.';
    }
    toast(msg,'err');
    return;
  }
  var url=tipo==='xlsx'?r.xlsxUrl:tipo==='pdf'?r.pdfUrl:r.ticketsUrl;
  if(!url){toast('No hay datos para generar ese reporte','err');return;}
  var rl=el('report-links');
  if(rl){
    var a=document.createElement('a');a.href=url;a.target='_blank';
    a.className='btn btn-o btn-sm btn-full';a.style.cssText='margin-top:6px;display:flex';
    a.textContent='Abrir '+tipo.toUpperCase()+' en Drive';
    rl.appendChild(a);
  }
  toast('&#10003; Listo — toca para abrir','ok');
}

function pickFecha(){
  oModal(
    '<div class="mtitle">Cambiar fecha</div>'+
    '<div class="fg"><label class="fl">Fecha</label>'+
    '<input type="date" class="fi" id="pfd" value="'+S.fecha+'" max="'+today()+'"/></div>'+
    '<button class="btn btn-g btn-full" id="btn-apply">Aplicar</button>'
  );
  setTimeout(function(){
    var b=el('btn-apply');
    if(b)b.addEventListener('click',function(){
      var v=el('pfd')&&el('pfd').value;
      if(v){S.fecha=v;S.compras={};S.tickets={};}
      cModal();pgHome();
    });
  },50);
}

/* ── NUEVA COMPRA ── */
var curProv=null,curItems=[],curTickets=[],curHasTicket=true,editIdx=-1;
function getUploadedTicketIds(){return curTickets.filter(function(t){return t&&t.uploaded&&t.ticketId;}).map(function(t){return t.ticketId;});}
function hasPendingTickets(){return curTickets.some(function(t){return t&&!t.uploaded&&t.file;});}
function hasTicketsForOcr(){return curTickets.some(function(t){return t&&t.file;});}

function pgNueva(){
  el('hdate').textContent=fmtS(S.fecha);
  curProv=null;curItems=[];curTickets=[];editIdx=-1;
  renderNueva();
}

function renderNueva(){
  var chips='';
  S.provs.forEach(function(p){
    chips+='<div class="chip'+(curProv===p.nombre?' sel':'')+
      '" data-nombre="'+encodeURIComponent(p.nombre)+
      '" data-ticket="'+(p.tieneTicket?'1':'0')+'">'+p.nombre+'</div>';
  });
  chips+='<div class="chip new" id="chip-new">+ Otro</div>';
  el('content').innerHTML=
    '<div style="font-size:11px;color:var(--wdim);margin-bottom:8px">Selecciona el proveedor</div>'+
    '<div style="display:flex;flex-wrap:wrap;margin-bottom:12px">'+chips+'</div>'+
    '<div id="prov-form">'+(curProv?renderProvForm():'')+'</div>';
  document.querySelectorAll('.chip[data-nombre]').forEach(function(c){c.addEventListener('click',function(){pickProv(c);});});
  el('chip-new').addEventListener('click',newProvModal);
  if(curProv)wireProvForm();
}

function pickProv(c){
  curProv=decodeURIComponent(c.dataset.nombre);
  curHasTicket=c.dataset.ticket==='1';
  curItems=[];curTickets=[];editIdx=-1;
  document.querySelectorAll('.chip[data-nombre]').forEach(function(x){x.classList.remove('sel');});
  c.classList.add('sel');
  el('prov-form').innerHTML=renderProvForm();
  wireProvForm();
}

/* FIX 2: Ticket zone — foto + archivo + múltiples tickets */
function renderTicketZone(){
  var uploadedIds=getUploadedTicketIds();
  var pending=curTickets.filter(function(t){return t&&!t.uploaded;}).length;
  var uploaded=uploadedIds.length;

  var bu=el('btn-upload-tickets');if(bu)bu.addEventListener('click',uploadPendingTickets);
  var bro=el('btn-read-ocr');if(bro)bro.addEventListener('click',readTicketsWithOcr);

function handleTktFiles(files){
  if(!files||!files.length)return;
  var added=0;
  Array.from(files).forEach(function(f){
    curTickets.push({file:f,name:f.name,displayName:f.name,uploaded:false,mimeType:f.type||'image/jpeg'});
    added++;
  });
  toast(added+' ticket(s) agregado(s). Ahora toca "Subir tickets ahora"','ok');
  el('prov-form').innerHTML=renderProvForm();
  wireProvForm();
}

async function addOrEditItem(){
  var p=el('ai-p')&&el('ai-p').value.trim();
  if(!p){toast('Escribe el nombre del producto','err');return;}
  var c=parseFloat(el('ai-c')&&el('ai-c').value)||1;
  var u=(el('ai-u')&&el('ai-u').value)||'pza';
  var pu=parseFloat(el('ai-pu')&&el('ai-pu').value)||0;
  var t=parseFloat(el('ai-t')&&el('ai-t').value)||(pu*c);
  var item={producto:p,cantidad:c,unidad:u,precioUnitario:pu,total:t||pu*c};
  if(editIdx>=0){
    var existing=curItems[editIdx];
    if(existing&&existing.savedId){
      load(true);
      var r=await api('editCompra',{id:existing.savedId,item:item});
      load(false);
      if(!r.ok){toast(r.error||'Error al actualizar','err');return;}
    }
    item.savedId=existing?existing.savedId:null;
    curItems[editIdx]=item;
    toast('Articulo actualizado','ok');
  }else{
    curItems.push(item);toast('Agregado','ok');
  }
  editIdx=-1;
  el('prov-form').innerHTML=renderProvForm();wireProvForm();
}


async function readTicketsWithOcr(){
  if(!curProv){toast('Selecciona un proveedor','err');return;}
  var readable=curTickets.filter(function(t){return t&&t.file&&!t.ocrAccepted;});
  if(!readable.length){toast('No hay tickets pendientes de OCR','err');return;}
  load(true);toast('Leyendo '+readable.length+' ticket(s) con OCR...');
  var detected=[];
  for(var i=0;i<readable.length;i++){
    var t=readable[i];
    try{
      var b64=await toB64(t.file);
      var r=await api('ocrTicket',{
        fecha:S.fecha,
        proveedor:curProv,
        mimeType:t.file.type||t.mimeType||'image/jpeg',
        base64Data:b64
      });
      if(r.ok && r.productos && r.productos.length){
        detected.push({ticket:t, proveedor:r.proveedor||curProv, total:r.total||0, productos:r.productos});
      }else{
        toast((t.displayName||t.name||('ticket '+(i+1)))+': '+(r.error||'Sin articulos detectados'),'err');
      }
    }catch(e){
      toast('OCR: '+e.message,'err');
    }
  }
  load(false);
  if(!detected.length){toast('No se detectaron artículos útiles','err');return;}
  openOcrReview(detected);
}

function escapeHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function acceptOcrItems(){
  var groups = window._ocrDetected || [];
  var accepted=[];
  groups.forEach(function(group,gi){
    group.productos.forEach(function(it,ii){
      var key=gi+'_'+ii;
      var pEl=document.querySelector('.ocr-p[data-k="'+key+'"]');
      if(!pEl)return;
      var prod=(pEl.value||'').trim();
      if(!prod)return;
      var c=parseFloat((document.querySelector('.ocr-c[data-k="'+key+'"]')||{}).value)||1;
      var u=((document.querySelector('.ocr-u[data-k="'+key+'"]')||{}).value||'pza').trim()||'pza';
      var pu=parseFloat((document.querySelector('.ocr-pu[data-k="'+key+'"]')||{}).value)||0;
      var t=parseFloat((document.querySelector('.ocr-t[data-k="'+key+'"]')||{}).value)||(pu*c);
      accepted.push({producto:prod,cantidad:c,unidad:u,precioUnitario:pu,total:t||0,fromOcr:true});
    });
  });
  if(!accepted.length){toast('No hay artículos válidos para aceptar','err');return;}
  curItems = curItems.concat(accepted);
  groups.forEach(function(g){ if(g.ticket){ g.ticket.ocrAccepted=true; } });
  cModal();
  el('prov-form').innerHTML=renderProvForm();wireProvForm();
  toast(accepted.length+' artículo(s) agregados desde OCR','ok');
}

function resetAcceptedOcrItems(){
  curTickets.forEach(function(t){ if(t){ delete t.ocrAccepted; } });
  curItems = curItems.filter(function(it){ return !it.fromOcr; });
  el('prov-form').innerHTML=renderProvForm();wireProvForm();
  toast('OCR reiniciado para este proveedor','ok');
}

async function uploadPendingTickets(){
  if(!curProv){toast('Selecciona un proveedor','err');return false;}
  var pending=curTickets.filter(function(t){return t&&!t.uploaded&&t.file;});
  if(!pending.length){toast('No hay tickets pendientes','err');return true;}
  load(true);toast('Subiendo '+pending.length+' ticket(s)...');
  var total=curItems.reduce(function(s,i){return s+(parseFloat(i.total)||0);},0);
  var okCount=0;
  for(var ti=0;ti<pending.length;ti++){
    var t=pending[ti];
    try{
      var b64=await toB64(t.file);
      var tr=await api('uploadTicket',{
        fecha:S.fecha,proveedor:curProv,
        fileName:t.file.name||t.name||('ticket_'+(ti+1)+'.jpg'),
        mimeType:t.file.type||t.mimeType||'image/jpeg',
        base64Data:b64,total:total,
        ticketIndex:curTickets.indexOf(t)
      });
      if(tr.ok){
        t.uploaded=true;
        t.ticketId=tr.ticketId;
        t.fileUrl=tr.fileUrl;
        t.displayName=tr.fileName||t.displayName||t.name;
        delete t.file;
        okCount++;
      }else{
        toast('Error ticket '+(ti+1)+': '+(tr.error||'No se pudo subir'),'err');
      }
    }catch(e){toast('Error ticket '+(ti+1)+': '+e.message,'err');}
  }
  load(false);
  el('prov-form').innerHTML=renderProvForm();wireProvForm();
  if(okCount){toast(okCount+' ticket(s) guardado(s) en Drive','ok');}
  return !hasPendingTickets();
}

async function guardarCompra(){
  if(!curProv){toast('Selecciona un proveedor','err');return;}
  if(!curItems.length){toast('Agrega al menos un articulo','err');return;}
  if(curHasTicket&&curTickets.length&&hasPendingTickets()){
    var ready=await uploadPendingTickets();
    if(!ready){toast('Primero termina de subir los tickets pendientes','err');return;}
  }
  load(true);
  var ticketIds=getUploadedTicketIds();
  var items=curItems.map(function(i){
    return{producto:i.producto,cantidad:i.cantidad,unidad:i.unidad,
           precioUnitario:i.precioUnitario,total:i.total,
           proveedor:curProv,ticketId:ticketIds[0]||'',ticketIds:ticketIds};
  });
  var r=await api('saveCompras',{fecha:S.fecha,items:items});
  load(false);
  if(r.ok){
    toast(curItems.length+' articulos guardados. Los reportes del dia se sobreescriben con la version nueva.','ok');
    curProv=null;curItems=[];curTickets=[];editIdx=-1;
    S.compras={};S.tickets={};
    renderNueva();
  }else toast(r.error||'Error guardando','err');
}

async function toB64(file){
  return new Promise(function(res,rej){
    var rd=new FileReader();
    rd.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var MAX=1400,r=Math.min(MAX/img.width,MAX/img.height,1);
        var c=document.createElement('canvas');c.width=img.width*r;c.height=img.height*r;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',0.85).split(',')[1]);
      };
      img.onerror=function(){
        // Si no es imagen (ej PDF), enviar base64 directo
        res(e.target.result.split(',')[1]||e.target.result);
      };
      img.src=e.target.result;
    };
    rd.onerror=rej;rd.readAsDataURL(file);
  });
}

      '<div style="font-size:13px;font-weight:600">'+last.producto+'</div>'+
      '<div class="mono gold">'+(last.precioUnitario>0?money(last.precioUnitario)+'/'+last.unidad:'--')+'</div></div>'+
      '<div style="font-size:11px;color:var(--wdim);margin-top:3px">Ultima: '+fmtL(last.fecha)+' — '+last.proveedor+'</div>'+
      '<div style="font-size:11px;color:var(--wdim)">'+last.cantidad+' '+last.unidad+' — Total: '+money(last.total)+'</div>';
    if(gr.items.length>1){
      html+='<div class="divider" style="margin:7px 0"></div>'+
        '<div style="font-size:11px;color:var(--wdim)">'+gr.items.length+' compras'+(ps.length>1?' — Rango: '+money(Math.min.apply(null,ps))+' a '+money(Math.max.apply(null,ps)):'')+'</div>';
      gr.items.slice(1,4).forEach(function(i){
        html+='<div class="fb" style="font-size:11px;padding:3px 0;border-bottom:1px solid var(--bord)">'+
          '<span class="muted">'+fmtS(i.fecha)+' — '+i.proveedor+'</span>'+
          '<span class="mono">'+(i.precioUnitario>0?money(i.precioUnitario):'--')+'</span></div>';
      });
    }
    html+='</div>';
  });
  el('sr').innerHTML=html;
}

/* ── HISTORIAL ── */

/* FIX 4: showDay con edición completa de items guardados */
async function showDay(fecha){
  load(true);
  var res=await Promise.all([api('getComprasByDate',{fecha:fecha}),api('getTicketsByDate',{fecha:fecha})]);
  var cr=res[0],tr=res[1];load(false);
  if(!cr.ok){toast(cr.error,'err');return;}
  var total=(cr.compras||[]).reduce(function(s,c){return s+(parseFloat(c.total)||0);},0);
  var byP=cr.byProveedor||{},ticks=tr.tickets||[];
  var isAdmin=S.user&&S.user.rol==='admin';

  var h='<div class="stats" style="margin-bottom:12px">'+
    '<div class="stat"><div class="slbl">Total del dia</div><div class="sval g" style="font-size:18px">'+money(total)+'</div></div>'+
    '<div class="stat"><div class="slbl">Articulos</div><div class="sval">'+((cr.compras||[]).length)+'</div></div></div>';

  Object.entries(byP).forEach(function(e){
    var pv=e[0],its=e[1];
    var sub=its.reduce(function(s,i){return s+(parseFloat(i.total)||0);},0);
    h+='<div style="margin-bottom:10px">'+
      '<div class="fb" style="margin-bottom:5px">'+
        '<div style="font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.06em;text-transform:uppercase">'+pv+'</div>'+
        '<div class="mono" style="font-size:12px;color:var(--gold)">'+money(sub)+'</div>'+
      '</div>';
    its.forEach(function(i){
      h+='<div class="irow">'+
        '<div class="iinfo">'+
          '<div class="iname">'+i.producto+'</div>'+
          '<div class="imeta">'+i.cantidad+' '+i.unidad+(i.precioUnitario>0?' — '+money(i.precioUnitario)+'/'+i.unidad:'')+'</div>'+
        '</div>'+
        '<div class="itot">'+money(i.total)+'</div>'+
        (isAdmin
          ?'<button class="iedit" data-id="'+i.id+'" data-prod="'+encodeURIComponent(JSON.stringify(i))+'" title="Editar">&#9998;</button>'+
           '<button class="idel"  data-id="'+i.id+'" title="Eliminar">&#10006;</button>'
          :''
        )+
      '</div>';
    });
    h+='</div>';
  });

  if(ticks.length){
    h+='<div class="divider"></div><div class="ctitle">Tickets del dia</div>';
    ticks.forEach(function(t){
      h+='<div class="fb" style="margin-bottom:6px;font-size:12px">'+
        '<span>'+t.proveedor+'</span>'+
        '<a href="'+t.fileUrl+'" target="_blank" class="btn btn-o btn-sm">Ver &#128206;</a></div>';
    });
  }

  h+='<div class="divider"></div>'+
    '<div style="font-size:11px;font-weight:600;color:var(--wdim);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">Generar Reportes</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px">'+
      '<button class="rb-btn rb-xl" id="hr-x"><span class="rb-icon">&#128202;</span><span>Excel</span></button>'+
      '<button class="rb-btn rb-pdf" id="hr-p"><span class="rb-icon">&#128196;</span><span>PDF</span></button>'+
      '<button class="rb-btn rb-tix" id="hr-t"><span class="rb-icon">&#128279;</span><span>Tickets</span></button>'+
    '</div>'+
    '<div id="hist-links"></div>';

  oModal(h,fmtL(fecha));
  setTimeout(function(){
    // Report buttons
    var hx=el('hr-x'),hp=el('hr-p'),ht=el('hr-t');
    if(hx)hx.addEventListener('click',function(){genHistReport(fecha,'xlsx');});
    if(hp)hp.addEventListener('click',function(){genHistReport(fecha,'pdf');});
    if(ht)ht.addEventListener('click',function(){genHistReport(fecha,'tickets');});
    // FIX 4: Edit/Delete items from historial (admin only)
    document.querySelectorAll('.iedit[data-id]').forEach(function(b){
      b.addEventListener('click',function(){editItemModal(b.dataset.id,JSON.parse(decodeURIComponent(b.dataset.prod)),fecha);});
    });
    document.querySelectorAll('.idel[data-id]').forEach(function(b){
      b.addEventListener('click',function(){deleteItemModal(b.dataset.id,fecha);});
    });
  },60);
}

/* FIX 4: Modal para editar un item ya guardado en historial */
function editItemModal(id,item,fecha){
  var h='<div class="mtitle">&#9998; Editar articulo</div>'+
    '<div class="fg"><label class="fl">Producto</label><input type="text" class="fi" id="em-p" value="'+item.producto+'"/></div>'+
    '<div class="fr3">'+
      '<div class="fg"><label class="fl">Cantidad</label><input type="number" class="fi" id="em-c" value="'+item.cantidad+'" step="0.01" min="0"/></div>'+
      '<div class="fg"><label class="fl">Unidad</label>'+
        '<select class="fi" id="em-u">'+
          ['pza','kg','lt','gr','ml','caja','bolsa'].map(function(u){return '<option'+(item.unidad===u?' selected':'')+'>'+u+'</option>';}).join('')+
        '</select>'+
      '</div>'+
      '<div class="fg"><label class="fl">P.U.</label><input type="number" class="fi" id="em-pu" value="'+item.precioUnitario+'" step="0.01" min="0"/></div>'+
    '</div>'+
    '<div class="fg"><label class="fl">Total</label><input type="number" class="fi" id="em-t" value="'+item.total+'" step="0.01" min="0"/></div>'+
    '<div style="display:flex;gap:8px">'+
      '<button class="btn btn-g btn-full" id="btn-em-save">Guardar cambios</button>'+
      '<button class="btn btn-o btn-sm" id="btn-em-cancel">Cancelar</button>'+
    '</div>';
  // Replace modal content without closing
  el('mc').innerHTML='<div class="mhandle" style="margin-bottom:14px"></div>'+h;
  setTimeout(function(){
    var bs=el('btn-em-save'),bc=el('btn-em-cancel');
    if(bc)bc.addEventListener('click',function(){showDay(fecha);});
    if(bs)bs.addEventListener('click',async function(){
      var p=el('em-p')&&el('em-p').value.trim();
      if(!p){toast('Escribe el producto','err');return;}
      var c=parseFloat(el('em-c')&&el('em-c').value)||1;
      var u=(el('em-u')&&el('em-u').value)||'pza';
      var pu=parseFloat(el('em-pu')&&el('em-pu').value)||0;
      var t=parseFloat(el('em-t')&&el('em-t').value)||(pu*c);
      load(true);
      var r=await api('editCompra',{id:id,item:{producto:p,cantidad:c,unidad:u,precioUnitario:pu,total:t||pu*c}});
      load(false);
      if(r.ok){toast('Articulo actualizado','ok');showDay(fecha);}
      else toast(r.error||'Error','err');
    });
  },50);
}

function deleteItemModal(id,fecha){
  var h='<div class="mtitle">Eliminar articulo</div>'+
    '<p style="font-size:13px;color:var(--wdim);margin-bottom:14px">Esta accion no se puede deshacer.</p>'+
    '<div style="display:flex;gap:8px">'+
      '<button class="btn btn-d btn-full" id="btn-del-conf">Eliminar</button>'+
      '<button class="btn btn-o btn-full" id="btn-del-canc">Cancelar</button>'+
    '</div>';
  el('mc').innerHTML='<div class="mhandle" style="margin-bottom:14px"></div>'+h;
  setTimeout(function(){
    var bc=el('btn-del-conf'),bx=el('btn-del-canc');
    if(bx)bx.addEventListener('click',function(){cModal();});
    if(bc)bc.addEventListener('click',async function(){
      load(true);var r=await api('deleteCompra',{id:id});load(false);
      if(r.ok){toast('Articulo eliminado','ok');showDay(fecha);}
      else toast(r.error||'Error','err');
    });
  },50);
}

async function genHistReport(fecha,tipo){
  load(true);toast('Generando '+tipo+'...');
  var r=await api('generateReport',{fecha:fecha,tipo:tipo});load(false);
  if(!r.ok){
    var msg=r.error||'Error';
    if(msg.indexOf('getFolderById')>-1||msg.indexOf('DriveApp')>-1){
      msg='ROOT_FOLDER_ID no configurado en Code.gs';
    }
    toast(msg,'err');return;
  }
  var url=tipo==='xlsx'?r.xlsxUrl:tipo==='pdf'?r.pdfUrl:r.ticketsUrl;
  if(!url){toast('Sin tickets para generar','err');return;}
  var hl=el('hist-links');
  if(hl){var a=document.createElement('a');a.href=url;a.target='_blank';a.className='btn btn-o btn-sm btn-full';a.style.cssText='margin-top:7px;display:flex';a.textContent='Abrir '+tipo.toUpperCase();hl.appendChild(a);}
  toast('Listo','ok');
}

/* ── BALANCE ── */
async function pgBalance(){
  el('hdate').textContent='';
  var d=new Date();
  var desde=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-01';
  el('content').innerHTML=
    '<div class="card">'+
      '<div class="ctitle">&#128200; Parametros del balance</div>'+
      '<div class="fr">'+
        '<div class="fg"><label class="fl">Desde</label><input type="date" class="fi" id="bal-desde" value="'+desde+'" max="'+today()+'"/></div>'+
        '<div class="fg"><label class="fl">Hasta</label><input type="date" class="fi" id="bal-hasta" value="'+today()+'" max="'+today()+'"/></div>'+
      '</div>'+
      '<button class="btn btn-g btn-full" id="btn-bal">Ver balance</button>'+
    '</div>'+
    '<div id="bal-result"></div>';
  el('btn-bal').addEventListener('click',calcBalance);
}
async function calcBalance(){
  var desde=el('bal-desde')&&el('bal-desde').value;
  var hasta=el('bal-hasta')&&el('bal-hasta').value;
  if(!desde||!hasta){toast('Selecciona rango de fechas','err');return;}
  if(desde>hasta){toast('La fecha inicial debe ser antes de la final','err');return;}
  load(true);toast('Calculando...');
  var r=await api('getComprasByDateRange',{desde:desde,hasta:hasta});
  load(false);
  if(!r.ok){toast(r.error||'Error','err');return;}
  if(!r.dias||r.dias===0){
    el('bal-result').innerHTML='<div class="empty"><div class="empty-ic">&#128200;</div><div class="empty-tx">Sin compras en ese rango</div></div>';return;
  }
  var html='<div class="bal-card">'+
    '<div class="ctitle">Resumen</div>'+
    '<div style="font-size:11px;color:var(--wdim);margin-bottom:10px">'+fmtL(desde)+' al '+fmtL(hasta)+'</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">'+
      '<div class="stat"><div class="slbl">Total gastado</div><div class="sval g" style="font-size:18px">'+money(r.total)+'</div></div>'+
      '<div class="stat"><div class="slbl">Dias con compras</div><div class="sval">'+r.dias+'</div><div class="ssub">Prom: '+money(r.promedioDia)+'/dia</div></div>'+
      '<div class="stat"><div class="slbl">Articulos</div><div class="sval">'+r.articulosCount+'</div></div>'+
      '<div class="stat"><div class="slbl">Proveedores</div><div class="sval">'+Object.keys(r.porProveedor).length+'</div></div>'+
    '</div></div>';
  html+='<div class="bal-card"><div class="ctitle">Por proveedor</div>';
  Object.entries(r.porProveedor).sort(function(a,b){return b[1]-a[1];}).forEach(function(e){
    var pct=r.total>0?((e[1]/r.total)*100).toFixed(1):'0';
    html+='<div class="balance-row"><span class="balance-prov">'+e[0]+'</span>'+
      '<span style="font-size:10px;color:var(--wdim);margin-right:8px">'+pct+'%</span>'+
      '<span class="balance-total">'+money(e[1])+'</span></div>';
  });
  html+='</div>';
  html+='<div class="bal-card"><div class="ctitle">Por dia (mas reciente primero)</div>';
  Object.keys(r.porFecha).sort().reverse().forEach(function(d){
    html+='<div class="balance-row">'+
      '<span class="balance-prov">'+fmtL(d)+'</span>'+
      '<span class="balance-total">'+money(r.porFecha[d])+'</span></div>';
  });
  html+='</div>';
  el('bal-result').innerHTML=html;
}

/* ── USUARIOS ── */
async function pgUsuarios(){
  if(S.user.rol!=='admin'){
    el('content').innerHTML='<div class="empty"><div class="empty-ic">&#128274;</div><div class="empty-tx">Solo administradores</div></div>';return;
  }
  el('hdate').textContent='';
  el('content').innerHTML='<div class="empty"><div class="sp" style="margin:0 auto"></div></div>';
  load(true);var r=await api('getUsers');load(false);
  var html='<div class="fb" style="margin-bottom:14px">'+
    '<div style="font-size:11px;color:var(--wdim)">'+((r.users||[]).length)+' usuario(s)</div>'+
    '<button class="btn btn-g btn-sm" id="btn-new-u">+ Nuevo usuario</button></div>';
  (r.users||[]).forEach(function(u){
    html+='<div class="ucard">'+
      '<div class="uav '+u.rol+'">'+u.nombre.charAt(0).toUpperCase()+'</div>'+
      '<div style="flex:1"><div class="dtitle">'+u.nombre+'</div>'+
      '<div><span class="badge '+(u.rol==='admin'?'bg':'bgray')+'">'+u.rol+'</span>'+
      (u.activo?'':'<span class="badge bred" style="margin-left:4px">inactivo</span>')+'</div></div>'+
      '<div style="display:flex;gap:6px">'+
        '<button class="btn btn-o btn-sm u-ed" data-u="'+encodeURIComponent(JSON.stringify(u))+'">&#9998; Editar</button>'+
        (u.id!==S.user.id?'<button class="btn btn-d btn-sm u-del" data-id="'+u.id+'" data-n="'+encodeURIComponent(u.nombre)+'">&#10006;</button>':'')+
      '</div></div>';
  });
  html+='<div class="divider"></div><div class="card"><div class="ctitle">Proveedores</div>';
  S.provs.forEach(function(p){
    html+='<div class="fb" style="padding:7px 0;border-bottom:1px solid var(--bord);font-size:13px">'+
      '<span>'+p.nombre+' <span class="badge bgray" style="font-size:9px">'+(p.tieneTicket?'ticket':'manual')+'</span></span>'+
      '<button class="btn btn-o btn-sm p-ed" data-p="'+encodeURIComponent(JSON.stringify(p))+'">&#9998;</button></div>';
  });
  html+='<button class="btn btn-o btn-full btn-sm mt12" id="btn-new-p">+ Agregar proveedor</button></div>';
  el('content').innerHTML=html;
  el('btn-new-u').addEventListener('click',function(){uForm(null);});
  el('btn-new-p').addEventListener('click',function(){pForm(null);});
  document.querySelectorAll('.u-ed').forEach(function(b){b.addEventListener('click',function(){uForm(JSON.parse(decodeURIComponent(b.dataset.u)));});});
  document.querySelectorAll('.u-del').forEach(function(b){b.addEventListener('click',function(){uDel(b.dataset.id,decodeURIComponent(b.dataset.n));});});
  document.querySelectorAll('.p-ed').forEach(function(b){b.addEventListener('click',function(){pForm(JSON.parse(decodeURIComponent(b.dataset.p)));});});
}
function uForm(u){
  var h='<div class="mtitle">'+(u?'Editar usuario':'Nuevo usuario')+'</div>'+
    '<div class="fg"><label class="fl">Nombre</label><input type="text" class="fi" id="uf-n" value="'+(u?u.nombre:'')+'" placeholder="Nombre del usuario"/></div>'+
    '<div class="fg"><label class="fl">PIN (4-6 digitos)</label><input type="password" class="fi" id="uf-p" placeholder="'+(u?'Nuevo PIN (vacio = no cambiar)':'Escribe el PIN')+'"/></div>'+
    '<div class="fg"><label class="fl">Privilegios</label><select class="fi" id="uf-r">'+
      '<option value="admin" '+(u&&u.rol==='admin'?'selected':'')+'>Admin — registra y edita todo</option>'+
      '<option value="viewer" '+(u&&u.rol!=='admin'?'selected':'')+'>Empleado — solo visualiza</option>'+
    '</select></div>'+
    '<button class="btn btn-g btn-full" id="btn-uf-s">'+(u?'Guardar cambios':'Crear usuario')+'</button>';
  var uid=u?u.id:'';
  oModal(h);
  setTimeout(function(){var b=el('btn-uf-s');if(b)b.addEventListener('click',function(){uSave(uid);});},50);
}
async function uSave(uid){
  var n=el('uf-n')&&el('uf-n').value.trim();
  var p=el('uf-p')&&el('uf-p').value.trim();
  var r=el('uf-r')&&el('uf-r').value;
  if(!n){toast('Escribe el nombre','err');return;}
  if(!uid&&!p){toast('El PIN es obligatorio para usuarios nuevos','err');return;}
  if(p&&(p.length<4||!/^\d+$/.test(p))){toast('PIN: 4-6 digitos numericos','err');return;}
  load(true);var ud={nombre:n,rol:r,activo:true};if(uid)ud.id=uid;if(p)ud.pin=p;
  var res=await api('saveUser',{userData:ud});load(false);cModal();
  if(res.ok){toast(res.msg||'Guardado','ok');pgUsuarios();}else toast(res.error||'Error','err');
}
function uDel(id,n){
  var h='<div class="mtitle">Desactivar usuario</div>'+
    '<p style="font-size:13px;color:var(--wdim);margin-bottom:14px">Desactivar a <strong>'+n+'</strong>?</p>'+
    '<div style="display:flex;gap:8px">'+
      '<button class="btn btn-d btn-full" id="btn-dc">Desactivar</button>'+
      '<button class="btn btn-o btn-full" id="btn-dx">Cancelar</button>'+
    '</div>';
  oModal(h);
  setTimeout(function(){
    var bc=el('btn-dc'),bx=el('btn-dx');
    if(bx)bx.addEventListener('click',cModal);
    if(bc)bc.addEventListener('click',async function(){
      load(true);var r=await api('deleteUser',{userId:id});load(false);cModal();
      if(r.ok){toast('Desactivado','ok');pgUsuarios();}else toast(r.error,'err');
    });
  },50);
}
function pForm(p){
  var h='<div class="mtitle">'+(p?'Editar proveedor':'Nuevo proveedor')+'</div>'+
    '<div class="fg"><label class="fl">Nombre</label><input type="text" class="fi" id="pf-n" value="'+(p?p.nombre:'')+'" placeholder="Nombre"/></div>'+
    '<div class="fg"><label class="fl">Genera ticket fisico?</label><select class="fi" id="pf-t">'+
      '<option value="true" '+(p&&p.tieneTicket!==false?'selected':'')+'>Si — se puede fotografiar</option>'+
      '<option value="false" '+(p&&p.tieneTicket===false?'selected':'')+'>No — entrada manual</option>'+
    '</select></div>'+
    '<button class="btn btn-g btn-full" id="btn-pfs">'+(p?'Guardar':'Agregar')+'</button>';
  var pid=p?p.id:'';
  oModal(h);
  setTimeout(function(){var b=el('btn-pfs');if(b)b.addEventListener('click',function(){pSave(pid);});},50);
}
async function pSave(pid){
  var n=el('pf-n')&&el('pf-n').value.trim();var t=el('pf-t')&&el('pf-t').value==='true';
  if(!n){toast('Escribe el nombre','err');return;}
  load(true);var pv={nombre:n,tieneTicket:t};if(pid)pv.id=pid;
  var r=await api('saveProveedor',{proveedor:pv});load(false);cModal();
  if(r.ok){toast('Guardado','ok');await loadProvs();pgUsuarios();}else toast(r.error||'Error','err');
}
